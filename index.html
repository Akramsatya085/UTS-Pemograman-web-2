<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Eksperimen WebSocket Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f5f5f5;
    }

    h1 {
      color: #333;
    }

    #chat-box {
      width: 100%;
      max-width: 500px;
      height: 300px;
      border: 1px solid #ccc;
      background: white;
      padding: 10px;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    input {
      width: 380px;
      padding: 8px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    .message {
      margin-bottom: 8px;
      padding: 6px;
      background: #e8f0fe;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>Chat Real-Time dengan WebSocket</h1>

  <div id="chat-box"></div>

  <input type="text" id="message-input" placeholder="Tulis pesan..." />
  <button onclick="sendMessage()">Kirim</button>

  <script>
    const socket = new WebSocket("ws://localhost:8080");
    const chatBox = document.getElementById("chat-box");
    const messageInput = document.getElementById("message-input");

    socket.onopen = () => {
      addMessage("Terhubung ke server WebSocket.");
    };

    socket.onmessage = (event) => {
      addMessage(event.data);
    };

    socket.onclose = () => {
      addMessage("Koneksi ke server terputus.");
    };

    function sendMessage() {
      const message = messageInput.value;

      if (message.trim() !== "") {
        socket.send(message);
        messageInput.value = "";
      }
    }

    function addMessage(message) {
      const div = document.createElement("div");
      div.className = "message";
      div.textContent = message;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
